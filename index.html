<body>
<div id="banner"></div>
<div id="root"></div>

<script>
"use strict";

/* ============================================================
   SAUNA AWARD — iPhone スタンドアロン版 (SAUNACHELIN風デザイン)
   ・入力: 和名 / ローマ字 / Address / URL / 画像
   ・永続化: IndexedDB
   ・エクスポート: def_tier{n}.csv (n,和名,ローマ字,Address,URL)
                  + data_tier{n}_{m}(画像)
   ============================================================ */

const TIERS = [
  { id:1, roman:"I",   jp:"至高" },
  { id:2, roman:"II",  jp:"殿堂" },
  { id:3, roman:"III", jp:"名湯" },
];
const SLOTS = 7;
const MAX_TITLE = 30;
const MAX_DATAURL = 1400000;

/* ---------------- IndexedDB ---------------- */
const DB_NAME = "sauna-award";
const STORE = "slots";
let dbPromise = null;
let storageOK = true;

function openDB(){
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve,reject)=>{
    try{
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore(STORE); };
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error||new Error("db open error"));
    }catch(e){ reject(e); }
  });
  return dbPromise;
}
function idbGet(key){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readonly").objectStore(STORE).get(key);
    tx.onsuccess = ()=>res(tx.result===undefined?null:tx.result);
    tx.onerror = ()=>rej(tx.error);
  }));
}
function idbSet(key,val){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite").objectStore(STORE).put(val,key);
    tx.onsuccess = ()=>res(true);
    tx.onerror = ()=>rej(tx.error);
  }));
}
function idbDel(key){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite").objectStore(STORE).delete(key);
    tx.onsuccess = ()=>res(true);
    tx.onerror = ()=>rej(tx.error);
  }));
}
const keyFor = (t,s)=>`t${t}s${s}`;

/* 旧バージョン(title/location)のデータを新形式へ変換 */
function normalize(e){
  if (!e) return null;
  return {
    title:   e.title   || "",
    roman:   e.roman   || "",
    address: e.address !== undefined ? e.address : (e.location || ""),
    url:     e.url     || "",
    image:   e.image   || "",
  };
}
function isEmpty(e){ return !e.title && !e.roman && !e.address && !e.url && !e.image; }

async function loadTier(t){
  const arr = [];
  for (let s=1; s<=SLOTS; s++){
    try{ arr.push(normalize(await idbGet(keyFor(t,s)))); }
    catch(e){ arr.push(null); }
  }
  return arr;
}

if (navigator.storage && navigator.storage.persist){
  navigator.storage.persist().catch(()=>{});
}

/* ---------------- 画像処理 ---------------- */
function fileToDataURL(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = ()=>rej(new Error("ファイルの読み込みに失敗"));
    r.readAsDataURL(file);
  });
}
function decodeViaImg(src){
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = ()=>res(img);
    img.onerror = ()=>rej(new Error("画像のデコードに失敗"));
    img.src = src;
  });
}
async function decodeImage(file,dataUrl){
  try{ return await decodeViaImg(dataUrl); }
  catch(e){
    if (typeof createImageBitmap==="function"){
      try{ return await createImageBitmap(file); }catch(e2){}
    }
    throw new Error("この形式の画像は変換できませんでした");
  }
}
async function compressImage(file){
  const raw = await fileToDataURL(file);
  let src;
  try{ src = await decodeImage(file,raw); }
  catch(e){
    if (raw.length < MAX_DATAURL) return raw;
    throw e;
  }
  const MAX_DIM = 1400;
  const w0 = src.width||src.naturalWidth, h0 = src.height||src.naturalHeight;
  const sc = Math.min(1, MAX_DIM/Math.max(w0,h0));
  const w = Math.max(1,Math.round(w0*sc)), h = Math.max(1,Math.round(h0*sc));
  const c = document.createElement("canvas");
  c.width=w; c.height=h;
  c.getContext("2d").drawImage(src,0,0,w,h);
  for (const q of [0.85,0.72,0.6,0.45,0.32]){
    const out = c.toDataURL("image/jpeg",q);
    if (out.length < MAX_DATAURL) return out;
  }
  const c2 = document.createElement("canvas");
  c2.width=Math.max(1,Math.round(w*0.6)); c2.height=Math.max(1,Math.round(h*0.6));
  c2.getContext("2d").drawImage(src,0,0,c2.width,c2.height);
  return c2.toDataURL("image/jpeg",0.4);
}

/* ---------------- エクスポート / インポート ---------------- */
function dataURLtoBlob(d){
  const i = d.indexOf(",");
  const meta = d.slice(0,i), b64 = d.slice(i+1);
  const m = meta.match(/data:(.*?);base64/);
  const mime = m ? m[1] : "image/jpeg";
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let j=0;j<bin.length;j++) arr[j]=bin.charCodeAt(j);
  return new Blob([arr],{type:mime});
}
function downloadBlob(name,blob){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },1500);
}
const csvSafe = (s)=>(s||"").replace(/,/g,"，").replace(/[\r\n]/g," ");

async function exportTier(t){
  const arr = cache[t] || await loadTier(t);
  /* def_tier{n}.csv: n,和名,ローマ字,Address,URL */
  let csv = "";
  for (let i=0;i<SLOTS;i++){
    const e = arr[i] || {};
    csv += `${i+1},${csvSafe(e.title)},${csvSafe(e.roman)},${csvSafe(e.address)},${(e.url||"").replace(/[\r\n]/g,"")}\n`;
  }
  downloadBlob(`def_tier${t}.csv`, new Blob([csv],{type:"text/csv;charset=utf-8"}));
  let count = 0;
  for (let i=0;i<SLOTS;i++){
    const e = arr[i];
    if (e && e.image){
      count++;
      const blob = dataURLtoBlob(e.image);
      const ext = blob.type==="image/png" ? "png" : "jpg";
      await new Promise(r=>setTimeout(r, 400));
      downloadBlob(`data_tier${t}_${i+1}.${ext}`, blob);
    }
  }
  return count;
}

async function importFiles(fileList){
  const files = Array.from(fileList);
  let touched = new Set();
  for (const f of files){
    const csvMatch = f.name.match(/^def_tier([123])\.csv$/i);
    const imgMatch = f.name.match(/^data_tier([123])_([1-7])\./i);
    if (csvMatch){
      const t = Number(csvMatch[1]);
      const text = await f.text();
      const lines = text.split(/\r?\n/).filter(l=>l.trim()!=="");
      const arr = cache[t] || await loadTier(t);
      for (const line of lines){
        const parts = line.split(",");
        const n = Number(parts[0]);
        if (!(n>=1 && n<=SLOTS)) continue;
        const prev = arr[n-1] || {};
        let next;
        if (parts.length <= 3){
          /* 旧形式: n,施設名,所在地 */
          next = normalize({ title:(parts[1]||"").trim(), location:(parts[2]||"").trim(), image:prev.image||"" });
        } else {
          next = {
            title:(parts[1]||"").trim().slice(0,MAX_TITLE),
            roman:(parts[2]||"").trim(),
            address:(parts[3]||"").trim(),
            url:parts.slice(4).join(",").trim(),
            image:prev.image||"",
          };
        }
        if (isEmpty(next)){ await idbDel(keyFor(t,n)); arr[n-1]=null; }
        else { await idbSet(keyFor(t,n), next); arr[n-1]=next; }
      }
      cache[t]=arr; touched.add(t);
    } else if (imgMatch){
      const t = Number(imgMatch[1]), n = Number(imgMatch[2]);
      const dataUrl = await compressImage(f);
      const arr = cache[t] || await loadTier(t);
      const prev = arr[n-1] || {};
      const next = normalize({...prev, image:dataUrl});
      await idbSet(keyFor(t,n), next);
      arr[n-1]=next; cache[t]=arr; touched.add(t);
    }
  }
  return touched.size;
}

/* ---------------- state / render ---------------- */
const cache = {};
let view = "home";
let activeTier = 1;
const root = document.getElementById("root");
const esc = (s)=>String(s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const pad2 = (n)=>String(n).padStart(2,"0");
function safeHref(u){
  const s = String(u||"").trim();
  if (/^https?:\/\//i.test(s)) return s;
  if (s && !/^[a-z]+:/i.test(s)) return "https://" + s;
  return "";
}

function marquee(text, lined){
  const seg = ` ${text} − `;
  const line = esc(seg.repeat(6));
  return `<div class="marquee ${lined?"lined":""}" aria-hidden="true"><div class="marquee-track"><span>${line}</span><span>${line}</span></div></div>`;
}

function go(v,t){
  view = v;
  if (t) activeTier = t;
  render();
  if ((v==="tierView"||v==="settingsTier") && !cache[activeTier]){
    loadTier(activeTier).then(arr=>{
      if (!cache[activeTier]) cache[activeTier]=arr;
      render();
    });
  }
  window.scrollTo(0,0);
}

/* ---- ① トップ ---- */
function homeHTML(){
  return `
  <div class="fade" style="min-height:100vh;display:flex;flex-direction:column;justify-content:space-between;">
    ${marquee("Sauna Award − My Personal Sauna Ranking − ととのえの記録", true)}
    <div style="padding:0 28px;text-align:center;">
      <p class="eyebrow" style="margin-bottom:28px;">Personal Archive</p>
      <h1 class="romaji" style="font-size:clamp(52px,15vw,110px);margin:0;">SAUNA<br>AWARD</h1>
      <div style="width:56px;height:1px;background:rgba(255,255,255,.4);margin:30px auto;"></div>
      <p style="font-size:13px;color:var(--paper-dim);letter-spacing:.2em;margin:0;">自分が行った、忘れがたきサウナを讃える。</p>
    </div>
    <div style="padding:0 28px 40px;max-width:420px;width:100%;margin:0 auto;">
      <button class="btn" data-go="tiers">Start</button>
      <div style="height:14px;"></div>
      <button class="btn" data-go="settingsTiers" style="border-color:var(--line);color:var(--paper-dim);">設定</button>
    </div>
  </div>`;
}

/* ---- ②④ Tier選択 ---- */
function tiersHTML(isSettings){
  const rows = TIERS.map(t=>`
    <button class="btn" data-tier="${t.id}" data-go="${isSettings?"settingsTier":"tierView"}"
      style="display:flex;align-items:baseline;justify-content:space-between;border-color:rgba(255,255,255,.35);padding:20px 26px;">
      <span style="font-family:'Jost',sans-serif;letter-spacing:.12em;font-size:17px;">
        TIER <span class="num-gold" style="font-size:24px;">${t.roman}</span>
      </span>
      <span style="font-family:'Noto Sans JP',sans-serif;font-size:11px;letter-spacing:.4em;color:var(--paper-dim);">${t.jp}</span>
    </button>`).join("");
  return `
  <div class="fade" style="min-height:100vh;display:flex;flex-direction:column;">
    <header style="padding:20px 24px 0;">
      <button class="back" data-go="home">← Top</button>
      <p class="eyebrow" style="margin-top:18px;">${isSettings?"Settings":"Archive"}</p>
      <h2 class="romaji" style="font-size:clamp(32px,9vw,54px);margin:6px 0 0;">SAUNA AWARD</h2>
      ${isSettings?`<p style="font-size:12px;color:var(--paper-dim);letter-spacing:.15em;margin-top:10px;">［設定］各Tierに 7施設まで登録できます</p>`:""}
    </header>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 24px;gap:18px;max-width:480px;width:100%;margin:0 auto;">
      ${rows}
    </div>
    ${marquee(isSettings?"Settings − 画像と施設情報を設定 − 7個まで":"Select Your Tier − 1〜7まで表示", true)}
  </div>`;
}

/* ---- ③ Tier表示（サウナシュラン風） ---- */
function entryHTML(e, i, t){
  const numBlock = `<span class="num-gold hero-num">${pad2(i+1)}</span>`;
  if (!e){
    return `
    <article style="padding:40px 0 36px;border-bottom:1px solid var(--line);">
      <div style="display:flex;align-items:flex-end;gap:16px;margin-bottom:14px;padding:0 22px;">
        <span class="num-gold" style="font-size:64px;opacity:.28;">${pad2(i+1)}</span>
        <span class="eyebrow" style="padding-bottom:10px;font-size:10px;">No.${i+1} — 未登録</span>
      </div>
      <div style="padding:0 22px;"><div class="empty-frame"><span class="eyebrow" style="font-size:10px;color:rgba(255,255,255,.25);">設定画面から登録できます</span></div></div>
    </article>`;
  }
  const href = safeHref(e.url);
  const hero = `
    <div class="hero" ${e.image?`style="background-image:url('${e.image}');"`:""}>
      ${numBlock}
      <div class="hero-inner">
        ${e.roman?`<h3 class="romaji">${esc(e.roman)}</h3>`:""}
        ${e.title?`<p class="waname">${esc(e.title)}</p>`:""}
        ${href?`<a class="detail-link" href="${esc(href)}" target="_blank" rel="noopener">⇗ 施設詳細へ</a>`:""}
      </div>
      ${e.address?`
      <div class="hero-addrbar">
        <span class="k">A</span>
        <span class="v">${esc(e.address)}</span>
      </div>`:""}
    </div>`;
  const meta = `
    <div class="meta">
      ${e.address?`<p class="mlabel">Address</p><p class="mval">${esc(e.address)}</p>`:""}
      ${href?`<p class="mlabel">URL</p><a class="mval" href="${esc(href)}" target="_blank" rel="noopener">${esc(e.url)}</a>`:""}
    </div>`;
  return `
  <article style="padding:34px 0 30px;border-bottom:1px solid var(--line);">
    <div style="padding:0 22px 12px;">
      <span class="mq-font" style="font-size:13px;color:rgba(255,255,255,.5);">Sauna of My Life − ${i+1} −${e.address?` @${esc(e.address)}`:""}</span>
    </div>
    ${hero}
    ${meta}
  </article>`;
}

function tierViewHTML(){
  const t = TIERS.find(x=>x.id===activeTier);
  const arr = cache[activeTier];
  if (!arr) return loadingHTML("tiers");
  const filled = arr.filter(Boolean).length;
  const items = arr.map((e,i)=>entryHTML(e,i,t)).join("");
  return `
  <div class="fade" style="min-height:100vh;">
    <header style="padding:20px 22px 14px;">
      <button class="back" data-go="tiers">← Tiers</button>
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-top:14px;">
        <div>
          <p class="eyebrow">Sauna Award</p>
          <h2 class="romaji" style="font-size:clamp(38px,11vw,68px);margin:4px 0 0;">TIER <span class="num-gold">${t.roman}</span></h2>
        </div>
        <p class="mq-font" style="font-size:12px;color:var(--paper-dim);margin:0;">${filled} / ${SLOTS}</p>
      </div>
    </header>
    ${marquee(`Sauna of My Life − Tier ${t.roman} − Sauna Award`, true)}
    <main style="max-width:620px;margin:0 auto;padding:0 0 80px;">${items}</main>
  </div>`;
}

/* ---- ⑤ 設定 ---- */
function settingsHTML(){
  const t = TIERS.find(x=>x.id===activeTier);
  const arr = cache[activeTier];
  if (!arr) return loadingHTML("settingsTiers");
  const items = arr.map((e,i)=>{
    const img = e&&e.image;
    const v = (k)=>esc(e&&e[k]);
    return `
    <article data-slot="${i}" style="padding:34px 0 30px;border-bottom:1px solid var(--line);">
      <div style="display:flex;align-items:flex-end;gap:14px;margin-bottom:12px;">
        <span class="num-gold" style="font-size:52px;${e?"":"opacity:.28;"}">${pad2(i+1)}</span>
        <span class="eyebrow" style="font-size:10px;padding-bottom:8px;">No.${i+1}</span>
      </div>
      <label class="file-label">
        <input class="file-input js-file" type="file" accept="image/*" data-slot="${i}" aria-label="No.${i+1} の画像を選択">
        <span class="pick-frame" style="border:${img?"1px solid var(--line)":"1px dashed rgba(255,255,255,.3)"};">
          ${img?`<img class="entry" src="${e.image}" alt="">`:`<span class="eyebrow" style="font-size:10px;">タップして画像を設定</span>`}
        </span>
      </label>
      <div style="margin-top:18px;">
        <p class="flabel" style="margin:0 0 2px;">サウナ施設名（和名）</p>
        <input class="tinput js-title" data-slot="${i}" maxlength="${MAX_TITLE}" placeholder="例：北こぶし知床 ホテル&リゾート" value="${v("title")}">
        <div style="text-align:right;margin-top:4px;"><span class="status js-count" data-slot="${i}" style="color:var(--paper-dim);">${(e&&e.title?e.title.length:0)} / ${MAX_TITLE}</span></div>
      </div>
      <div style="margin-top:6px;">
        <p class="flabel" style="margin:0 0 2px;">サウナ施設名（ローマ字）</p>
        <input class="tinput js-roman" data-slot="${i}" maxlength="60" placeholder="例：KITAKOBUSHI SHIRETOKO HOTEL & RESORT" value="${v("roman")}">
      </div>
      <div style="margin-top:14px;">
        <p class="flabel" style="margin:0 0 2px;">Address</p>
        <input class="tinput js-address" data-slot="${i}" maxlength="60" placeholder="例：〒099-4355 北海道斜里郡斜里町ウトロ東172" value="${v("address")}">
      </div>
      <div style="margin-top:14px;">
        <p class="flabel" style="margin:0 0 2px;">URL</p>
        <input class="tinput js-url" data-slot="${i}" inputmode="url" placeholder="例：https://www.shiretoko.co.jp/" value="${v("url")}">
      </div>
      <div style="display:flex;align-items:center;gap:16px;margin-top:20px;">
        <button class="save-btn js-save" data-slot="${i}">保存</button>
        <span class="status js-status" data-slot="${i}" style="color:var(--gold);" aria-live="polite"></span>
        <button class="back js-clear" data-slot="${i}" style="font-size:10px;padding:0;margin-left:auto;">クリア</button>
      </div>
    </article>`;
  }).join("");
  return `
  <div class="fade" style="min-height:100vh;">
    <header style="padding:20px 24px 14px;">
      <button class="back" data-go="settingsTiers">← 設定</button>
      <p class="eyebrow" style="margin-top:14px;">Settings</p>
      <h2 class="romaji" style="font-size:clamp(30px,8.5vw,52px);margin:4px 0 0;">TIER <span class="num-gold">${t.roman}</span> SETTING</h2>
      <p style="font-size:12px;color:var(--paper-dim);letter-spacing:.15em;margin-top:10px;line-height:1.9;">
        画像は写真アプリから選択。入力後は「保存」を押してください。
      </p>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
        <button class="tool-btn js-export">このTierをエクスポート</button>
        <label class="tool-btn" style="display:inline-block;">
          インポート<input class="file-input js-import" type="file" multiple accept=".csv,text/csv,image/*">
        </label>
      </div>
      <p class="status js-toolmsg" style="color:var(--gold);margin-top:10px;display:block;"></p>
      <p style="font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.1em;margin-top:8px;line-height:1.8;">
        エクスポートで def_tier${activeTier}.csv（n,和名,ローマ字,Address,URL）と data_tier${activeTier}_n(画像) がダウンロードされます。<br>
        ファイルアプリで「sauna_award/data/tier${activeTier}」へ移動して保管してください。
      </p>
    </header>
    ${marquee(`Settings − Tier ${t.roman} − 7個まで設定`, true)}
    <main style="max-width:560px;margin:0 auto;padding:8px 24px 80px;">${items}</main>
  </div>`;
}

function loadingHTML(backTo){
  return `
  <div class="fade" style="min-height:100vh;padding:20px 24px;">
    <button class="back" data-go="${backTo}">← 戻る</button>
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;"><span class="eyebrow">Loading…</span></div>
  </div>`;
}

/* ---- 保存処理 ---- */
function readSlotInputs(slot){
  const g = (cls)=>{ const el = root.querySelector(`.${cls}[data-slot="${slot}"]`); return el?el.value:""; };
  const prev = (cache[activeTier]||[])[slot];
  return {
    title:   g("js-title").slice(0,MAX_TITLE).trim(),
    roman:   g("js-roman").trim(),
    address: g("js-address").trim(),
    url:     g("js-url").trim(),
    image:   (prev&&prev.image)||"",
  };
}
function setStatus(slot, msg, isError){
  const el = root.querySelector(`.js-status[data-slot="${slot}"]`);
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? "#D97362" : "var(--gold)";
  if (msg==="SAVED ✓") setTimeout(()=>{ if(el.textContent==="SAVED ✓") el.textContent=""; },2000);
}
async function persistSlot(slot, next){
  const key = keyFor(activeTier, slot+1);
  const arr = cache[activeTier] || Array(SLOTS).fill(null);
  try{
    if (isEmpty(next)){
      await idbDel(key); arr[slot]=null;
    } else {
      await idbSet(key, next); arr[slot]=next;
    }
    cache[activeTier]=arr;
    setStatus(slot,"SAVED ✓");
    return true;
  }catch(e){
    arr[slot] = isEmpty(next)?null:next;
    cache[activeTier]=arr;
    storageOK = false; showBanner();
    setStatus(slot,"保存に失敗しました（画面には反映済み）",true);
    return false;
  }
}

function showBanner(){
  document.getElementById("banner").innerHTML = storageOK ? "" :
    `<div class="banner">この環境では永続保存に失敗しています。エクスポートでのバックアップをおすすめします</div>`;
}

/* ---- events ---- */
document.addEventListener("click", async (ev)=>{
  const goEl = ev.target.closest("[data-go]");
  if (goEl){
    const tier = goEl.getAttribute("data-tier");
    go(goEl.getAttribute("data-go"), tier?Number(tier):undefined);
    return;
  }
  const saveEl = ev.target.closest(".js-save");
  if (saveEl){
    const slot = Number(saveEl.getAttribute("data-slot"));
    setStatus(slot,"SAVING…");
    await persistSlot(slot, readSlotInputs(slot));
    render();
    return;
  }
  const clearEl = ev.target.closest(".js-clear");
  if (clearEl){
    const slot = Number(clearEl.getAttribute("data-slot"));
    await persistSlot(slot,{title:"",roman:"",address:"",url:"",image:""});
    render();
    return;
  }
  const expEl = ev.target.closest(".js-export");
  if (expEl){
    const msg = root.querySelector(".js-toolmsg");
    msg.textContent = "エクスポート中…";
    try{
      const n = await exportTier(activeTier);
      msg.textContent = `def_tier${activeTier}.csv と画像${n}枚をダウンロードしました`;
    }catch(e){
      msg.textContent = "エクスポートに失敗しました";
    }
    return;
  }
});

document.addEventListener("change", async (ev)=>{
  if (ev.target.classList.contains("js-file")){
    const slot = Number(ev.target.getAttribute("data-slot"));
    const file = ev.target.files && ev.target.files[0];
    ev.target.value = "";
    if (!file) return;
    setStatus(slot,"SAVING…");
    try{
      const dataUrl = await compressImage(file);
      const next = readSlotInputs(slot);
      next.image = dataUrl;
      await persistSlot(slot,next);
      render();
    }catch(e){
      setStatus(slot, e&&e.message?e.message:"画像の設定に失敗しました", true);
    }
    return;
  }
  if (ev.target.classList.contains("js-import")){
    const files = ev.target.files;
    const msg = root.querySelector(".js-toolmsg");
    msg.textContent = "インポート中…";
    try{
      const n = await importFiles(files);
      msg.textContent = n>0 ? "インポートが完了しました" : "対象ファイル（def_tierN.csv / data_tierN_n）が見つかりません";
      render();
    }catch(e){
      msg.textContent = "インポートに失敗しました";
    }
    ev.target.value = "";
    return;
  }
});

/* 入力欄からフォーカスが外れたら自動保存 */
document.addEventListener("focusout",(ev)=>{
  const cl = ev.target.classList;
  if (cl && (cl.contains("js-title")||cl.contains("js-roman")||cl.contains("js-address")||cl.contains("js-url"))){
    const slot = Number(ev.target.getAttribute("data-slot"));
    const next = readSlotInputs(slot);
    const prev = (cache[activeTier]||[])[slot] || {title:"",roman:"",address:"",url:"",image:""};
    if (next.title!==(prev.title||"") || next.roman!==(prev.roman||"") ||
        next.address!==(prev.address||"") || next.url!==(prev.url||"")){
      persistSlot(slot,next);
    }
  }
});
/* 文字数カウンター */
document.addEventListener("input",(ev)=>{
  if (ev.target.classList && ev.target.classList.contains("js-title")){
    const slot = ev.target.getAttribute("data-slot");
    const c = root.querySelector(`.js-count[data-slot="${slot}"]`);
    if (c) c.textContent = `${ev.target.value.length} / ${MAX_TITLE}`;
  }
});

function render(){
  showBanner();
  if (view==="home") root.innerHTML = homeHTML();
  else if (view==="tiers") root.innerHTML = tiersHTML(false);
  else if (view==="settingsTiers") root.innerHTML = tiersHTML(true);
  else if (view==="tierView") root.innerHTML = tierViewHTML();
  else if (view==="settingsTier") root.innerHTML = settingsHTML();
}

render();
</script>
</body>
</html>
