<body>
<div id="bgimg"></div>
<div id="banner"></div>
<div id="root"></div>
<div id="cropper"></div>
<div id="modal"></div>

<script>
"use strict";

/* ============================================================
   SAUNA AWARD — iPhone スタンドアロン版 (SAUNACHELIN風デザイン)
   ・入力: 和名 / ローマ字 / Address / URL / 画像
   ・永続化: IndexedDB
   ・エクスポート: def_tier{n}.csv (n,和名,ローマ字,Address,URL)
                  + data_tier{n}_{m}(画像)
   ============================================================ */

const TIERS = [
  { id:1, roman:"I",   jp:"至高" },
  { id:2, roman:"II",  jp:"殿堂" },
  { id:3, roman:"III", jp:"名湯" },
];
const SLOTS = 7;
const MAX_TITLE = 30;
const MAX_DATAURL = 1400000;
const APP_VER = "1.3";

/* ---------------- IndexedDB ---------------- */
const DB_NAME = "sauna-award";
const STORE = "slots";
let dbPromise = null;
let storageOK = true;

function openDB(){
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve,reject)=>{
    try{
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore(STORE); };
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error||new Error("db open error"));
    }catch(e){ reject(e); }
  });
  return dbPromise;
}
function idbGet(key){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readonly").objectStore(STORE).get(key);
    tx.onsuccess = ()=>res(tx.result===undefined?null:tx.result);
    tx.onerror = ()=>rej(tx.error);
  }));
}
function idbSet(key,val){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite").objectStore(STORE).put(val,key);
    tx.onsuccess = ()=>res(true);
    tx.onerror = ()=>rej(tx.error);
  }));
}
function idbDel(key){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite").objectStore(STORE).delete(key);
    tx.onsuccess = ()=>res(true);
    tx.onerror = ()=>rej(tx.error);
  }));
}
const keyFor = (t,s)=>`t${t}s${s}`;

/* ---------------- 容量の最適化（DBの作り直し） ----------------
   IndexedDBは削除・上書き後も内部に空き領域を抱えたまま
   ファイルサイズを維持するため、使用容量が減らない。
   全データをメモリに退避→DBファイルを削除→書き戻すことで
   実際の使用容量を減らす */
function closeDB(){
  const p = dbPromise;
  dbPromise = null;
  if (!p) return Promise.resolve();
  return p.then(db=>{ try{ db.close(); }catch(e){} }).catch(()=>{});
}
function deleteDB(){
  return new Promise((resolve)=>{
    const req = indexedDB.deleteDatabase(DB_NAME);
    req.onsuccess = ()=>resolve(true);
    req.onerror = ()=>resolve(false);
    req.onblocked = ()=>resolve(false);
  });
}
async function rebuildDatabase(model){
  await closeDB();
  await deleteDB();
  for (const t of [1,2,3]){
    const arr = [];
    for (let i=0;i<SLOTS;i++){
      const e = model[t][i];
      if (e && !isEmpty(e)){
        await idbSet(keyFor(t,i+1), e);
        arr.push(e);
      } else {
        arr.push(null);
      }
    }
    cache[t] = arr;
  }
}
async function snapshotAll(){
  const model = {};
  for (const t of [1,2,3]){
    model[t] = cache[t] ? cache[t].slice() : await loadTier(t);
    if (!cache[t]) cache[t] = model[t];
  }
  return model;
}
async function compactStorage(){
  const model = await snapshotAll();
  await rebuildDatabase(model);
}

/* 旧バージョン(title/location)のデータを新形式へ変換 */
function normalize(e){
  if (!e) return null;
  return {
    title:   e.title   || "",
    roman:   e.roman   || "",
    address: e.address !== undefined ? e.address : (e.location || ""),
    url:     e.url     || "",
    image:   e.image   || "",
    minis:   Array.isArray(e.minis) ? e.minis.filter(Boolean).slice(0,3) : [],
  };
}
function isEmpty(e){ return !e.title && !e.roman && !e.address && !e.url && !e.image && (!e.minis || e.minis.length===0); }

async function loadTier(t){
  const arr = [];
  for (let s=1; s<=SLOTS; s++){
    try{ arr.push(normalize(await idbGet(keyFor(t,s)))); }
    catch(e){ arr.push(null); }
  }
  return arr;
}

if (navigator.storage && navigator.storage.persist){
  navigator.storage.persist().catch(()=>{});
}

/* ---------------- 背景画像 ----------------
   トップ/START/設定画面の背景。IDBのキー "bg" に保存。 */
const BG_KEY = "bg";
let appBg = null;
const bgReady = idbGet(BG_KEY)
  .then((v)=>{ appBg = (typeof v==="string" && v) ? v : null; if (appBg) render(); })
  .catch(()=>{});

/* ---------------- 容量の解放（DBの作り直し） ----------------
   IndexedDBは削除・上書き後もディスク上に残骸が残り、使用容量が
   減らないことがある。そこで削除系の操作後に、
   「このアプリ専用DB(sauna-award)だけを削除 → 現在の登録内容だけを書き戻す」
   ことで実際の容量を登録内容ぶんまで戻す。
   注意: indexedDB.deleteDatabase("sauna-award") は当アプリが自分で
   作成したデータベースのみを削除するAPIであり、iPhone内の他の
   データ・写真・ファイルには一切アクセスしない。 */
let rebuilding = false;

/* このアプリ専用DB(sauna-award)のみを削除し、完了を確実に待つ */
function deleteOwnDatabase(){
  return new Promise((res)=>{
    let done = false;
    const finish = ()=>{ if(!done){ done=true; res(); } };
    try{
      const req = indexedDB.deleteDatabase(DB_NAME);
      req.onsuccess = finish;
      req.onerror = finish;
      /* 接続が残っていてブロックされた場合も、閉じ次第削除される */
      req.onblocked = ()=>setTimeout(finish, 800);
      setTimeout(finish, 4000); /* 保険 */
    }catch(e){ finish(); }
  });
}

/* アプリが実際に保持しているデータ量（バイト）を直接計算する。
   OSへの問い合わせ(navigator.storage.estimate)は内部ファイルの
   整理が終わるまで減少が反映されないため、表示にはこちらを使う */
async function calcDataSize(){
  await bgReady;
  let bytes = appBg ? appBg.length : 0;
  for (const T of TIERS){
    const t = T.id;
    const arr = cache[t] || await loadTier(t);
    if (!cache[t]) cache[t] = arr;
    for (const e of arr){
      if (e) bytes += JSON.stringify(e).length;
    }
  }
  return bytes;
}

async function rebuildDatabase(){
  if (rebuilding) return;
  rebuilding = true;
  try{
    /* 1) 現在の登録内容（背景画像含む）をメモリへ退避 */
    await bgReady;
    const all = {};
    let hasAny = !!appBg;
    for (const T of TIERS){
      const t = T.id;
      all[t] = cache[t] || await loadTier(t);
      if (all[t].some(Boolean)) hasAny = true;
    }
    /* 2) 自前のDBだけを削除（接続を閉じてから） */
    try{ const db = await openDB(); db.close(); }catch(e){}
    dbPromise = null;
    await deleteOwnDatabase();
    /* 3) 登録が1件でもあれば書き戻す（空なら空のまま＝ほぼ0MB） */
    if (hasAny){
      for (const T of TIERS){
        const t = T.id;
        for (let i=0;i<SLOTS;i++){
          const e = all[t][i];
          if (e && !isEmpty(e)) await idbSet(keyFor(t,i+1), e);
        }
      }
      if (appBg) await idbSet(BG_KEY, appBg);
    }
    for (const T of TIERS) cache[T.id] = all[T.id];
  } finally {
    rebuilding = false;
  }
}

/* ---------------- 画像処理 ---------------- */
function fileToDataURL(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = ()=>rej(new Error("ファイルの読み込みに失敗"));
    r.readAsDataURL(file);
  });
}
function decodeViaImg(src){
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = ()=>res(img);
    img.onerror = ()=>rej(new Error("画像のデコードに失敗"));
    img.src = src;
  });
}
async function decodeImage(file,dataUrl){
  try{ return await decodeViaImg(dataUrl); }
  catch(e){
    if (typeof createImageBitmap==="function"){
      try{ return await createImageBitmap(file); }catch(e2){}
    }
    throw new Error("この形式の画像は変換できませんでした");
  }
}
async function compressImage(file){
  const raw = await fileToDataURL(file);
  let src;
  try{ src = await decodeImage(file,raw); }
  catch(e){
    if (raw.length < MAX_DATAURL) return raw;
    throw e;
  }
  const MAX_DIM = 1400;
  const w0 = src.width||src.naturalWidth, h0 = src.height||src.naturalHeight;
  const sc = Math.min(1, MAX_DIM/Math.max(w0,h0));
  const w = Math.max(1,Math.round(w0*sc)), h = Math.max(1,Math.round(h0*sc));
  const c = document.createElement("canvas");
  c.width=w; c.height=h;
  c.getContext("2d").drawImage(src,0,0,w,h);
  for (const q of [0.85,0.72,0.6,0.45,0.32]){
    const out = c.toDataURL("image/jpeg",q);
    if (out.length < MAX_DATAURL) return out;
  }
  const c2 = document.createElement("canvas");
  c2.width=Math.max(1,Math.round(w*0.6)); c2.height=Math.max(1,Math.round(h*0.6));
  c2.getContext("2d").drawImage(src,0,0,c2.width,c2.height);
  return c2.toDataURL("image/jpeg",0.4);
}

/* ---------------- エクスポート / インポート ---------------- */
function dataURLtoBlob(d){
  const i = d.indexOf(",");
  const meta = d.slice(0,i), b64 = d.slice(i+1);
  const m = meta.match(/data:(.*?);base64/);
  const mime = m ? m[1] : "image/jpeg";
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let j=0;j<bin.length;j++) arr[j]=bin.charCodeAt(j);
  return new Blob([arr],{type:mime});
}
function downloadBlob(name,blob){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },1500);
}
const csvSafe = (s)=>(s||"").replace(/,/g,"，").replace(/[\r\n]/g," ");

/* ---------------- 一括バックアップ / 復元（zip） ----------------
   zip内容: def_tier{n}.csv（n,和名,ローマ字,Address,URL）
            data_tier{n}_{m}.jpg（メイン画像）
            mini_tier{n}_{m}_{k}.jpg（ミニ写真）
   zipは無圧縮(store)で作成。復元はstore/deflate両対応。 */

const CRC_T = (()=>{ const t=new Uint32Array(256);
  for(let i=0;i<256;i++){ let c=i; for(let k=0;k<8;k++) c = (c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[i]=c; }
  return t; })();
function crc32(u8){ let c=0xFFFFFFFF;
  for(let i=0;i<u8.length;i++) c = CRC_T[(c^u8[i])&0xFF]^(c>>>8);
  return (c^0xFFFFFFFF)>>>0; }

function buildZip(files){
  const enc = new TextEncoder();
  const chunks=[]; const central=[]; let offset=0;
  const u16=(v)=>[v&255,(v>>>8)&255];
  const u32=(v)=>[v&255,(v>>>8)&255,(v>>>16)&255,(v>>>24)&255];
  for (const f of files){
    const name = enc.encode(f.name);
    const crc = crc32(f.data), sz = f.data.length;
    const lh = new Uint8Array([
      ...u32(0x04034b50),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),
      ...u32(crc),...u32(sz),...u32(sz),...u16(name.length),...u16(0)
    ]);
    chunks.push(lh,name,f.data);
    central.push({name,crc,sz,offset});
    offset += lh.length+name.length+sz;
  }
  const cdStart = offset; let cdSize = 0;
  for (const c of central){
    const ch = new Uint8Array([
      ...u32(0x02014b50),...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),
      ...u32(c.crc),...u32(c.sz),...u32(c.sz),
      ...u16(c.name.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(c.offset)
    ]);
    chunks.push(ch,c.name); cdSize += ch.length+c.name.length;
  }
  chunks.push(new Uint8Array([
    ...u32(0x06054b50),...u16(0),...u16(0),
    ...u16(central.length),...u16(central.length),
    ...u32(cdSize),...u32(cdStart),...u16(0)
  ]));
  return new Blob(chunks,{type:"application/zip"});
}

async function readZip(buf){
  const dv = new DataView(buf), u8 = new Uint8Array(buf);
  let eocd = -1;
  const stop = Math.max(0, buf.byteLength-22-65536);
  for (let i=buf.byteLength-22; i>=stop; i--){
    if (dv.getUint32(i,true)===0x06054b50){ eocd=i; break; }
  }
  if (eocd<0) throw new Error("zip形式を認識できません");
  const count = dv.getUint16(eocd+10,true);
  let p = dv.getUint32(eocd+16,true);
  const dec = new TextDecoder();
  const out = [];
  for (let n=0;n<count;n++){
    if (dv.getUint32(p,true)!==0x02014b50) break;
    const method = dv.getUint16(p+10,true);
    const csize = dv.getUint32(p+20,true);
    const nameLen = dv.getUint16(p+28,true), extraLen = dv.getUint16(p+30,true), cmtLen = dv.getUint16(p+32,true);
    const lho = dv.getUint32(p+42,true);
    const rawName = dec.decode(u8.subarray(p+46, p+46+nameLen));
    p += 46+nameLen+extraLen+cmtLen;
    if (rawName.endsWith("/")) continue;
    const lnl = dv.getUint16(lho+26,true), lel = dv.getUint16(lho+28,true);
    const start = lho+30+lnl+lel;
    let data = u8.slice(start, start+csize);
    if (method===8){
      const ab = await new Response(
        new Blob([data]).stream().pipeThrough(new DecompressionStream("deflate-raw"))
      ).arrayBuffer();
      data = new Uint8Array(ab);
    } else if (method!==0){ continue; }
    out.push({ name: rawName.split("/").pop(), data });
  }
  return out;
}

function dataURLtoBytes(d){ return new Uint8Array(atob(d.slice(d.indexOf(",")+1)).split("").map(c=>c.charCodeAt(0))); }
function bytesToDataURL(bytes, mime){
  let bin=""; const CH=0x8000;
  for (let i=0;i<bytes.length;i+=CH) bin += String.fromCharCode.apply(null, bytes.subarray(i,i+CH));
  return `data:${mime};base64,`+btoa(bin);
}
const extMime = (name)=>/\.png$/i.test(name) ? "image/png" : "image/jpeg";

async function buildBackup(){
  await bgReady;
  const files = [];
  if (appBg) files.push({ name:"bg.jpg", data:dataURLtoBytes(appBg) });
  for (const T of TIERS){
    const t = T.id;
    const arr = cache[t] || await loadTier(t);
    if (!cache[t]) cache[t]=arr;
    let csv = "";
    for (let i=0;i<SLOTS;i++){
      const e = arr[i] || {};
      csv += `${i+1},${csvSafe(e.title)},${csvSafe(e.roman)},${csvSafe(e.address)},${(e.url||"").replace(/[\r\n]/g,"")}\n`;
    }
    files.push({ name:`def_tier${t}.csv`, data:new TextEncoder().encode(csv) });
    for (let i=0;i<SLOTS;i++){
      const e = arr[i];
      if (!e) continue;
      if (e.image) files.push({ name:`data_tier${t}_${i+1}.jpg`, data:dataURLtoBytes(e.image) });
      (e.minis||[]).forEach((m,k)=>{
        if (m) files.push({ name:`mini_tier${t}_${i+1}_${k+1}.jpg`, data:dataURLtoBytes(m) });
      });
    }
  }
  const stamp = new Date().toISOString().slice(0,10).replace(/-/g,"");
  downloadBlob(`sauna_award_backup_${stamp}.zip`, buildZip(files));
}

async function restoreFromZip(file){
  const entries = await readZip(await file.arrayBuffer());
  if (!entries.length) throw new Error("zip内にファイルがありません");
  /* 復元は全上書き: まず空のモデルを作り、zipの内容を流し込む */
  const blank = ()=>({title:"",roman:"",address:"",url:"",image:"",minis:[]});
  const model = {1:[],2:[],3:[]};
  for (const t of [1,2,3]) for (let i=0;i<SLOTS;i++) model[t].push(blank());
  let recognized = 0;
  let newBg = null;
  for (const f of entries){
    const csvMatch = f.name.match(/^def_tier([123])\.csv$/i);
    const imgMatch = f.name.match(/^data_tier([123])_([1-7])\.(jpg|jpeg|png)$/i);
    const miniMatch = f.name.match(/^mini_tier([123])_([1-7])_([123])\.(jpg|jpeg|png)$/i);
    const bgMatch = f.name.match(/^bg\.(jpg|jpeg|png)$/i);
    if (bgMatch){
      recognized++;
      newBg = bytesToDataURL(f.data, extMime(f.name));
    } else if (csvMatch){
      recognized++;
      const t = Number(csvMatch[1]);
      const lines = new TextDecoder().decode(f.data).split(/\r?\n/).filter(l=>l.trim()!=="");
      for (const line of lines){
        const parts = line.split(",");
        const n = Number(parts[0]);
        if (!(n>=1 && n<=SLOTS)) continue;
        const e = model[t][n-1];
        if (parts.length <= 3){
          e.title = (parts[1]||"").trim().slice(0,MAX_TITLE);
          e.address = (parts[2]||"").trim();
        } else {
          e.title = (parts[1]||"").trim().slice(0,MAX_TITLE);
          e.roman = (parts[2]||"").trim();
          e.address = (parts[3]||"").trim();
          e.url = parts.slice(4).join(",").trim();
        }
      }
    } else if (imgMatch){
      recognized++;
      model[Number(imgMatch[1])][Number(imgMatch[2])-1].image = bytesToDataURL(f.data, extMime(f.name));
    } else if (miniMatch){
      recognized++;
      model[Number(miniMatch[1])][Number(miniMatch[2])-1].minis[Number(miniMatch[3])-1] = bytesToDataURL(f.data, extMime(f.name));
    }
  }
  if (!recognized) throw new Error("バックアップ形式のファイルが見つかりません");
  /* 既存の設定はすべて上書き。
     容量が積み上がらないよう、このアプリ専用DBを一旦削除してから
     zipの内容だけを書き込む（他サイト・iPhone本体のデータには触れない） */
  try{ const db = await openDB(); db.close(); }catch(e){}
  dbPromise = null;
  await deleteOwnDatabase();
  await bgReady;
  appBg = newBg;
  if (newBg) await idbSet(BG_KEY, newBg);
  for (const t of [1,2,3]){
    const arr = [];
    for (let i=0;i<SLOTS;i++){
      const e = model[t][i];
      e.minis = e.minis.filter(Boolean).slice(0,3);
      if (isEmpty(e)){ arr.push(null); }
      else { await idbSet(keyFor(t,i+1), e); arr.push(e); }
    }
    cache[t] = arr;
  }
}

/* ミニ写真用: 小さめに圧縮 */
async function compressMini(file){
  const raw = await fileToDataURL(file);
  let src;
  try{ src = await decodeImage(file,raw); }
  catch(e){
    if (raw.length < 500000) return raw;
    throw e;
  }
  const MAX_DIM = 800;
  const w0 = src.width||src.naturalWidth, h0 = src.height||src.naturalHeight;
  const sc = Math.min(1, MAX_DIM/Math.max(w0,h0));
  const w = Math.max(1,Math.round(w0*sc)), h = Math.max(1,Math.round(h0*sc));
  const c = document.createElement("canvas");
  c.width=w; c.height=h;
  c.getContext("2d").drawImage(src,0,0,w,h);
  for (const q of [0.8,0.65,0.5,0.35]){
    const out = c.toDataURL("image/jpeg",q);
    if (out.length < 500000) return out;
  }
  return c.toDataURL("image/jpeg",0.3);
}

/* ---------------- 画像切り抜き（ユーザーが範囲を選択） ----------------
   表示枠(幅:高さ=10:13)に合わせた切り取り枠を表示し、
   ドラッグで位置・スライダーで拡大率を選んでから確定する */
const CROP_AR = 13/10;
const OUT_W = 1000, OUT_H = 1300;
const cropperEl = document.getElementById("cropper");
let crop = null; // {img, slot, fw, fh, s, min, max, tx, ty, drag}

function clampCrop(){
  const iw = crop.img.naturalWidth*crop.s, ih = crop.img.naturalHeight*crop.s;
  crop.tx = Math.min(0, Math.max(crop.fw - iw, crop.tx));
  crop.ty = Math.min(0, Math.max(crop.fh - ih, crop.ty));
}
function applyCrop(){
  clampCrop();
  const im = document.getElementById("crop-img");
  im.style.width = (crop.img.naturalWidth*crop.s)+"px";
  im.style.transform = `translate(${crop.tx}px,${crop.ty}px)`;
}
function openCropper(img, opts){
  const ar = opts.ar || CROP_AR;
  let fw = Math.min(Math.round(window.innerWidth*0.86), 360);
  let fh = Math.round(fw*ar);
  const maxH = Math.round(window.innerHeight*0.6);
  if (fh > maxH){ fh = maxH; fw = Math.max(80, Math.round(fh/ar)); }
  const min = Math.max(fw/img.naturalWidth, fh/img.naturalHeight);
  crop = { img, opts, fw, fh, s:min, min, max:min*4,
           tx:(fw-img.naturalWidth*min)/2, ty:(fh-img.naturalHeight*min)/2, drag:null };
  cropperEl.innerHTML = `
    <p class="crop-note">切り取る範囲を選択してください<br>ドラッグで移動 ／ スライダーで拡大</p>
    <div class="crop-frame" id="crop-frame" style="width:${fw}px;height:${fh}px;">
      <img id="crop-img" alt="">
    </div>
    <input class="crop-zoom" id="crop-zoom" type="range" min="0" max="100" value="0" aria-label="拡大率">
    <div class="crop-actions">
      <button class="tool-btn" id="crop-cancel" style="flex:1;">キャンセル</button>
      <button class="save-btn" id="crop-ok" style="flex:1;letter-spacing:.15em;">この範囲で設定</button>
    </div>`;
  document.getElementById("crop-img").src = img.src;
  cropperEl.classList.add("open");
  applyCrop();
  const frame = document.getElementById("crop-frame");
  frame.addEventListener("pointerdown",(e)=>{
    e.preventDefault();
    frame.setPointerCapture(e.pointerId);
    crop.drag = { x:e.clientX, y:e.clientY, tx:crop.tx, ty:crop.ty };
  });
  frame.addEventListener("pointermove",(e)=>{
    if (!crop || !crop.drag) return;
    crop.tx = crop.drag.tx + (e.clientX - crop.drag.x);
    crop.ty = crop.drag.ty + (e.clientY - crop.drag.y);
    applyCrop();
  });
  const endDrag = ()=>{ if (crop) crop.drag = null; };
  frame.addEventListener("pointerup", endDrag);
  frame.addEventListener("pointercancel", endDrag);
  document.getElementById("crop-zoom").addEventListener("input",(e)=>{
    const t = Number(e.target.value)/100;
    const s2 = crop.min + (crop.max - crop.min)*t;
    /* 枠の中心を基準に拡大縮小 */
    const cx = crop.fw/2, cy = crop.fh/2;
    const px = (cx - crop.tx)/crop.s, py = (cy - crop.ty)/crop.s;
    crop.s = s2;
    crop.tx = cx - px*s2;
    crop.ty = cy - py*s2;
    applyCrop();
  });
  document.getElementById("crop-cancel").addEventListener("click", closeCropper);
  document.getElementById("crop-ok").addEventListener("click", confirmCrop);
}
function closeCropper(){
  cropperEl.classList.remove("open");
  cropperEl.innerHTML = "";
  crop = null;
}
async function confirmCrop(){
  if (!crop) return;
  const { img, opts, s, tx, ty, fw, fh } = crop;
  const sx = -tx/s, sy = -ty/s, sw = fw/s, sh = fh/s;
  const c = document.createElement("canvas");
  c.width = opts.outW; c.height = opts.outH;
  c.getContext("2d").drawImage(img, sx, sy, sw, sh, 0, 0, opts.outW, opts.outH);
  let out = c.toDataURL("image/jpeg", 0.85);
  for (const q of [0.72, 0.6, 0.45, 0.32]){
    if (out.length < MAX_DATAURL) break;
    out = c.toDataURL("image/jpeg", q);
  }
  closeCropper();
  await opts.onDone(out);
}

      ${e.address?`<p class="mlabel">Address</p><p class="mval">${esc(e.address)}</p>`:""}
      ${href?`<p class="mlabel">URL</p><a class="mval" href="${esc(href)}" target="_blank" rel="noopener">${esc(e.url)}</a>`:""}
    </div>`;
  /* ミニ写真: 登録枚数が少なくても同じ画像を繰り返してループさせる */
  let miniStrip = "";
  const minis = (e.minis||[]).filter(Boolean);
  if (minis.length){
    let seq = [];
    while (seq.length < 6) seq = seq.concat(minis);
    const group = seq.map(m=>`<img src="${m}" alt="">`).join("");
    miniStrip = `<div class="mini-strip" aria-hidden="true"><div class="mini-track">${group}${group}</div></div>`;
  }
  return `
  <article style="padding:34px 0 30px;border-bottom:1px solid var(--line);">
    ${hero}
    ${meta}
    ${miniStrip}
  </article>`;
}

function tierViewHTML(){
  const t = TIERS.find(x=>x.id===activeTier);
  const arr = cache[activeTier];
  if (!arr) return loadingHTML("tiers");
  const filled = arr.filter(Boolean).length;

  return `
  <div class="fade" style="min-height:100vh;">

      <button class="back" data-go="tiers">← Tiers</button>

        <div>
          <p class="eyebrow">Sauna Award</p>
          <h2 class="romaji" style="font-size:clamp(38px,11vw,68px);margin:4px 0 0;">TIER <span class="num-gold">${t.roman}</span></h2>

}

      </div>

                <span class="mini-pick">${m?`<img src="${m}" alt="">`:`<span class="eyebrow" style="font-size:14px;">＋</span>`}</span>

function loadingHTML(backTo){
  return `
  <div class="fade" style="min-height:100vh;padding:20px 24px;">
    <button class="back" data-go="${backTo}">← 戻る</button>
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;"><span class="eyebrow">Loading…</span></div>
  </div>`;
}

/* ---- 保存処理 ---- */
function readSlotInputs(slot){
  const g = (cls)=>{ const el = root.querySelector(`.${cls}[data-slot="${slot}"]`); return el?el.value:""; };
  const prev = (cache[activeTier]||[])[slot];
  return {
    title:   g("js-title").slice(0,MAX_TITLE).trim(),
    roman:   g("js-roman").trim(),
    address: g("js-address").trim(),
    url:     g("js-url").trim(),
    image:   (prev&&prev.image)||"",
    minis:   (prev&&prev.minis)?prev.minis.slice():[],
  };
}
function setStatus(slot, msg, isError){
  const el = root.querySelector(`.js-status[data-slot="${slot}"]`);
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? "#D97362" : "var(--gold)";
  if (msg==="SAVED ✓") setTimeout(()=>{ if(el.textContent==="SAVED ✓") el.textContent=""; },2000);
}
async function persistSlot(slot, next, compact){
  const key = keyFor(activeTier, slot+1);
  const arr = cache[activeTier] || Array(SLOTS).fill(null);
  try{
    if (isEmpty(next)){
      await idbDel(key); arr[slot]=null;
    } else {
      await idbSet(key, next); arr[slot]=next;
    }
    cache[activeTier]=arr;
    /* 画像の削除・差し替えを伴う操作では残骸を掃除して容量を戻す */
    if (compact) await rebuildDatabase();
    setStatus(slot,"SAVED ✓");
    return true;
  }catch(e){
    arr[slot] = isEmpty(next)?null:next;
    cache[activeTier]=arr;
    storageOK = false; showBanner();
    setStatus(slot,"保存に失敗しました（画面には反映済み）",true);
    return false;
  }
}

function showBanner(){
  document.getElementById("banner").innerHTML = storageOK ? "" :
    `<div class="banner">この環境では永続保存に失敗しています。エクスポートでのバックアップをおすすめします</div>`;
}

/* ---- events ---- */
document.addEventListener("click", async (ev)=>{
  const goEl = ev.target.closest("[data-go]");
  if (goEl){
    const tier = goEl.getAttribute("data-tier");
    go(goEl.getAttribute("data-go"), tier?Number(tier):undefined);
    return;
  }
  const saveEl = ev.target.closest(".js-save");
  if (saveEl){
    const slot = Number(saveEl.getAttribute("data-slot"));
    setStatus(slot,"SAVING…");
    await persistSlot(slot, readSlotInputs(slot));
    render();
    return;
  }
  const clearEl = ev.target.closest(".js-clear");
  if (clearEl){
    const slot = Number(clearEl.getAttribute("data-slot"));
    await persistSlot(slot,{title:"",roman:"",address:"",url:"",image:"",minis:[]}, true);
    render();
    return;
  }
  const bakEl = ev.target.closest(".js-backup");
  if (bakEl){
    const msg = root.querySelector(".js-bakmsg");
    msg.textContent = "バックアップ作成中…";
    try{
      await buildBackup();
      msg.textContent = "バックアップ(zip)をダウンロードしました";
    }catch(e){
      msg.textContent = "バックアップに失敗しました";
    }
    return;
  }
  const bgmEl = ev.target.closest(".js-bgmenu");
  if (bgmEl){ showBgMenu(); return; }
  const bgdEl = ev.target.closest(".js-bgdefault");
  if (bgdEl){
    closeModal();
    await bgReady;
    appBg = null;
    try{ await idbDel(BG_KEY); }catch(e){}
    /* 背景を消したぶん容量を戻す */
    await rebuildDatabase();
    render();
    const msg = root.querySelector(".js-bakmsg");
    if (msg) msg.textContent = "背景をデフォルトに戻しました";
    return;
  }
  const bgcEl = ev.target.closest(".js-bgcancel");
  if (bgcEl){ closeModal(); return; }
  const mdelEl = ev.target.closest(".js-minidel");
  if (mdelEl){
    const slot = Number(mdelEl.getAttribute("data-slot"));
    const k = Number(mdelEl.getAttribute("data-mini"));
    const next = readSlotInputs(slot);
    next.minis = (next.minis||[]).slice();
    next.minis[k] = null;
    next.minis = next.minis.filter(Boolean).slice(0,3);
    await persistSlot(slot, next, true);
    render();
    return;
  }
});

document.addEventListener("change", async (ev)=>{
  if (ev.target.classList.contains("js-file")){
    const slot = Number(ev.target.getAttribute("data-slot"));
    const file = ev.target.files && ev.target.files[0];
    ev.target.value = "";
    if (!file) return;
    try{
      const raw = await fileToDataURL(file);
      let imgEl = null;
      try{ imgEl = await decodeViaImg(raw); }catch(e){}
      if (imgEl){
        /* 切り取り画面を表示し、ユーザーが範囲を選択してから設定 */
        openCropper(imgEl, {
          ar: CROP_AR, outW: OUT_W, outH: OUT_H,
          onDone: async (out)=>{
            setStatus(slot, "SAVING…");
            const next = readSlotInputs(slot);
            next.image = out;
            await persistSlot(slot, next, true);
            render();
          }
        });
      } else {
        /* 表示できない形式は従来の自動変換で保存 */
        setStatus(slot,"SAVING…");
        const dataUrl = await compressImage(file);
        const next = readSlotInputs(slot);
        next.image = dataUrl;
        await persistSlot(slot,next, true);
        render();
      }
    }catch(e){
      setStatus(slot, e&&e.message?e.message:"画像の設定に失敗しました", true);
    }
    return;
  }
  if (ev.target.classList.contains("js-mini")){
    const slot = Number(ev.target.getAttribute("data-slot"));
    const k = Number(ev.target.getAttribute("data-mini"));
    const file = ev.target.files && ev.target.files[0];
    ev.target.value = "";
    if (!file) return;
    setStatus(slot,"SAVING…");
    try{
      const dataUrl = await compressMini(file);
      const next = readSlotInputs(slot);
      next.minis = (next.minis||[]).slice();
      next.minis[k] = dataUrl;
      next.minis = next.minis.filter(Boolean).slice(0,3);
      await persistSlot(slot, next, true);
      render();
    }catch(e){
      setStatus(slot, e&&e.message?e.message:"ミニ写真の設定に失敗しました", true);
    }
    return;
  }
  if (ev.target.classList.contains("js-bgfile")){
    const file = ev.target.files && ev.target.files[0];
    ev.target.value = "";
    closeModal();
    if (!file) return;
    try{
      const raw = await fileToDataURL(file);
      const imgEl = await decodeViaImg(raw);
      /* スマホの画面サイズと同じ縦横比で切り抜き */
      const ar = window.innerHeight / window.innerWidth;
      openCropper(imgEl, {
        ar, outW: 1080, outH: Math.min(2400, Math.round(1080*ar)),
        onDone: async (out)=>{
          await bgReady;
          appBg = out;
          try{ await idbSet(BG_KEY, out); }catch(e){ storageOK=false; showBanner(); }
          /* 古い背景の残骸を掃除 */
          await rebuildDatabase();
          render();
          const msg = root.querySelector(".js-bakmsg");
          if (msg) msg.textContent = "背景画像を設定しました";
        }
      });
    }catch(e){
      const msg = root.querySelector(".js-bakmsg");
      if (msg) msg.textContent = "この画像は背景に使用できませんでした";
    }
    return;
  }
  if (ev.target.classList.contains("js-restore")){
    const file = ev.target.files && ev.target.files[0];
    ev.target.value = "";
    if (!file) return;
    const msg = root.querySelector(".js-bakmsg");
    /* 復元前に確認ポップアップを表示（現在の設定はすべて上書き） */
    const ok = await showConfirm(
      `復元ファイルは問題ないですか？<br><span style="font-size:12px;color:var(--paper-dim);">${esc(file.name)}<br>現在の登録内容はすべて上書きされます</span>`,
      "問題なし","戻る"
    );
    if (!ok){ if(msg) msg.textContent = "復元をキャンセルしました"; return; }
    if (msg) msg.textContent = "復元中…";
    try{
      await restoreFromZip(file);
      if (msg) msg.textContent = "復元が完了しました";
      render();
    }catch(e){
      if (msg) msg.textContent = e&&e.message?e.message:"復元に失敗しました";
    }
    return;
  }
});

/* 入力欄からフォーカスが外れたら自動保存 */
document.addEventListener("focusout",(ev)=>{
  const cl = ev.target.classList;
  if (cl && (cl.contains("js-title")||cl.contains("js-roman")||cl.contains("js-address")||cl.contains("js-url"))){
    const slot = Number(ev.target.getAttribute("data-slot"));
    const next = readSlotInputs(slot);
    const prev = (cache[activeTier]||[])[slot] || {title:"",roman:"",address:"",url:"",image:""};
    if (next.title!==(prev.title||"") || next.roman!==(prev.roman||"") ||
        next.address!==(prev.address||"") || next.url!==(prev.url||"")){
      persistSlot(slot,next);
    }
  }
});
/* 文字数カウンター */
document.addEventListener("input",(ev)=>{
  if (ev.target.classList && ev.target.classList.contains("js-title")){
    const slot = ev.target.getAttribute("data-slot");
    const c = root.querySelector(`.js-count[data-slot="${slot}"]`);
    if (c) c.textContent = `${ev.target.value.length} / ${MAX_TITLE}`;
  }
});

function render(){
  showBanner();
  if (view==="home") root.innerHTML = homeHTML();
  else if (view==="tiers") root.innerHTML = tiersHTML(false);
  else if (view==="settingsTiers") root.innerHTML = tiersHTML(true);
  else if (view==="tierView") root.innerHTML = tierViewHTML();
  else if (view==="settingsTier") root.innerHTML = settingsHTML();
  /* 背景画像: トップ/START/設定画面のみに適用 */
  const bgEl = document.getElementById("bgimg");
  if (bgEl){
    const showBg = appBg && (view==="home" || view==="tiers" || view==="settingsTiers");
    if (showBg){
      bgEl.style.backgroundImage = `url('${appBg}')`;
      bgEl.classList.add("on");
      root.style.background = "transparent";
    } else {
      bgEl.classList.remove("on");
      bgEl.style.backgroundImage = "";
      root.style.background = "";
    }
  }
  /* 設定トップでは現在の登録データ量を表示（実データを直接計算） */
  if (view==="settingsTiers"){
    calcDataSize().then((bytes)=>{
      const el = document.getElementById("usage");
      if (el){
        el.textContent = `登録データ容量: ${(bytes/1048576).toFixed(1)} MB`;
      }
    }).catch(()=>{});
  }
  /* 写真上ティッカーの速度を一定にする:
     アニメーションは「幅の半分を所要時間で移動」するため、
     文字列が長いほど速くなってしまう。実際の幅を測り、
     ピクセル毎秒が一定（ゆっくりめ）になるよう所要時間を個別に設定する */
  if (view==="tierView"){
    const SPEED = 35; /* px/秒 */
    const tune = ()=>{
      document.querySelectorAll(".hero-ticker .marquee-track").forEach((tr)=>{
        const half = tr.scrollWidth / 2;
        if (half > 0) tr.style.animationDuration = Math.max(10, half / SPEED) + "s";
      });
    };
    tune();
    /* Webフォント読み込み後に幅が変わる場合があるため再調整 */
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(tune).catch(()=>{});
  }
}

render();
</script>
